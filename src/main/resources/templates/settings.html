<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:with="currentTheme=${currentTheme != null} ? ${currentTheme} : 'light'">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Expressify</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body th:attr="data-theme=${currentTheme},class=${currentTheme + '-theme'}">
    <div class="container">
        <nav class="navbar relative">
            <div class="nav-brand">
                <h2><a th:href="@{/home}" style="color:inherit;text-decoration:none;">Expressify</a></h2>
            </div>
            <div class="nav-links">
                <a th:href="@{/home}" class="nav-item"><i class="fas fa-home"></i> Home</a>
                <a th:href="@{/posts}" class="nav-item"><i class="fas fa-pen"></i> Create Post</a>
                <a th:href="@{/explore}" class="nav-item"><i class="fas fa-compass"></i> Explore</a>
                <a th:href="@{/notifications}" class="nav-item" style="position:relative;">
                    <i class="fas fa-bell"></i> Notifications
                </a>
                <a th:href="@{/profile}" class="nav-item"><i class="fas fa-user"></i> My Profile</a>
                <a th:href="@{/dm}" class="nav-item"><i class="fas fa-comments"></i> DM</a>
                <a th:href="@{/friends}" class="nav-item"><i class="fas fa-users"></i> Friends</a>
                <a th:href="@{/settings}" class="nav-item active"><i class="fas fa-cog"></i> Settings</a>
                <!-- <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="nav-item"
                        style="background:none;border:none;cursor:pointer;font:inherit;color:inherit;"><i
                            class="fas fa-sign-out-alt"></i> Logout</button>
                </form> -->

<form th:action="@{/logout}" method="post" class="logout-form" style="margin:0; padding:0;">
    <button type="submit" class="nav-item nav-logout-btn" style="margin:0; padding:0;">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</form>

            </div>
            <div class="nav-toggle"><i class="fas fa-bars"></i></div>
        </nav>
        <div class="content settings-container">
            <h2><i class="fas fa-cog"></i> Settings</h2>
            <p th:if="${message}" class="alert success" th:text="${message}"></p>
            <p th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></p>

            <div class="settings-form">
                <h3>Account</h3>
                <form method="post" th:action="@{/settings/account}">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" th:value="${currentUser.username}" required />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" th:value="${currentUser.email}" required />
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea name="bio" th:text="${currentUser.bio}">Bio</textarea>
                    </div>
                    <button type="submit" class="save-button"><i class="fas fa-save"></i> Save</button>
                </form>
            </div>

            <div class="settings-form">
                <h3>Change Password</h3>
                <form method="post" th:action="@{/settings/password}">
                    <div class="form-group">
                        <label for="settings_current_password">Current Password</label>
                        <div class="password-field-wrap">
                            <input type="password" id="settings_current_password" name="current_password" required
                                autocomplete="current-password" />
                            <button type="button" class="password-toggle-btn" aria-label="Show password"
                                aria-pressed="false">
                                <i class="fas fa-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="settings_new_password">New Password</label>
                        <div class="password-field-wrap">
                            <input type="password" id="settings_new_password" name="new_password" required
                                autocomplete="new-password" minlength="9" />
                            <button type="button" class="password-toggle-btn" aria-label="Show password"
                                aria-pressed="false">
                                <i class="fas fa-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="password-strength-block" id="settings_new_password_meter" aria-live="polite">
                            <div class="password-strength-track">
                                <span class="password-strength-fill" id="settings_password_strength_fill"></span>
                            </div>
                            <span class="password-strength-text" id="settings_password_strength_text">Password strength</span>
                        </div>
                        <ul class="password-rules" id="settings_password_rules">
                            <li data-rule="len"><i class="fas fa-circle"></i> Longer than 8 characters (9+)</li>
                            <li data-rule="upper"><i class="fas fa-circle"></i> Uppercase letter</li>
                            <li data-rule="lower"><i class="fas fa-circle"></i> Lowercase letter</li>
                            <li data-rule="num"><i class="fas fa-circle"></i> Number</li>
                            <li data-rule="special"><i class="fas fa-circle"></i> Special character</li>
                        </ul>
                    </div>
                    <div class="form-group">
                        <label for="settings_confirm_password">Confirm New Password</label>
                        <div class="password-field-wrap">
                            <input type="password" id="settings_confirm_password" name="confirm_password" required
                                autocomplete="new-password" minlength="9" />
                            <button type="button" class="password-toggle-btn" aria-label="Show password"
                                aria-pressed="false">
                                <i class="fas fa-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="save-button"><i class="fas fa-key"></i> Update Password</button>
                </form>
            </div>

            <!-- <div class="settings-form">
                <h3>Privacy</h3>
                <form method="post" th:action="@{/settings/privacy}">
                    <div class="form-group">
                        <label><input type="checkbox" name="private_account"
                                th:checked="${currentUser.privateAccount}" /> Private account</label>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" name="show_activity" th:checked="${currentUser.showActivity}" />
                            Show activity status</label>
                    </div>
                    <button type="submit" class="save-button"><i class="fas fa-save"></i> Save</button>
                </form>
            </div> -->

            <div class="settings-form theme-selector">
                <h3>Appearance</h3>
                <form method="post" th:action="@{/settings/theme}">
                    <div class="theme-options">
                        <div class="theme-option">
                            <input type="radio" name="theme" id="theme-light" value="light"
                                th:checked="${currentUser.theme == 'light'}" />
                            <label for="theme-light" class="theme-label"><i class="fas fa-sun"></i> Light</label>
                        </div>
                        <div class="theme-option">
                            <input type="radio" name="theme" id="theme-dark" value="dark"
                                th:checked="${currentUser.theme == 'dark'}" />
                            <label for="theme-dark" class="theme-label"><i class="fas fa-moon"></i> Dark</label>
                        </div>
                        <div class="theme-option">
                            <input type="radio" name="theme" id="theme-unite" value="unite"
                                th:checked="${currentUser.theme == 'unite'}" />
                            <label for="theme-unite" class="theme-label"><i class="fas fa-palette"></i> Unite</label>
                        </div>
                    </div>
                    <button type="submit" class="save-button"><i class="fas fa-palette"></i> Save Theme</button>
                </form>
            </div>

            <div class="settings-form">
                <h3>Profile Picture</h3>
                <form method="post" th:action="@{/settings/profile-picture}" enctype="multipart/form-data">
                    <div class="form-group">
                        <input type="file" name="profile_picture" accept="image/*" />
                    </div>
                    <button type="submit" class="save-button"><i class="fas fa-upload"></i> Upload</button>
                </form>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
