<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:with="currentTheme=${currentTheme != null} ? ${currentTheme} : 'light'">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Expressify</title>

    <link rel="stylesheet" th:href="@{/css/tailwind.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body th:attr="data-theme=${currentTheme},class=${currentTheme + '-theme'}">

<div class="container">

    <!-- NAVBAR -->
    <nav class="navbar relative">
        <div class="nav-brand">
            <h2>
                <a th:href="@{/home}" style="color:inherit;text-decoration:none;">
                    Expressify
                </a>
            </h2>
        </div>

        <div class="nav-links">
            <a th:href="@{/home}" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a th:href="@{/posts}" class="nav-item"><i class="fas fa-pen"></i> Create Post</a>
            <a th:href="@{/explore}" class="nav-item"><i class="fas fa-compass"></i> Explore</a>

            <a th:href="@{/notifications}" class="nav-item">
                <i class="fas fa-bell"></i> Notifications
                <span th:if="${unreadCount != null and unreadCount > 0}"
                      class="notification-badge"
                      th:text="${unreadCount}">0</span>
            </a>

            <a th:href="@{/profile}" class="nav-item"><i class="fas fa-user"></i> My Profile</a>
            <a th:href="@{/dm}" class="nav-item"><i class="fas fa-comments"></i> DM</a>
            <a th:href="@{/friends}" class="nav-item active"><i class="fas fa-users"></i> Friends</a>
            <a th:href="@{/settings}" class="nav-item"><i class="fas fa-cog"></i> Settings</a>

            <!-- Logout -->
            <!-- <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="nav-item nav-logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form> -->
            <form th:action="@{/logout}" method="post" class="logout-form" style="margin:0; padding:0;">
    <button type="submit" class="nav-item nav-logout-btn" style="margin:0; padding:0;">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</form>

        </div>

        <div class="nav-toggle"><i class="fas fa-bars"></i></div>
    </nav>

    <!-- CONTENT -->
    <div class="content">

        <!-- HEADER -->
        <div class="friends-header-row">
            <h2>
                <i class="fas fa-users"></i>
                <span th:text="${searchQuery != null and !#strings.isEmpty(searchQuery)} 
                                ? 'Search Results' 
                                : 'Connect with Others'">
                </span>
            </h2>
        </div>

        <!-- 🔍 SEARCH -->
        <form th:action="@{/friends}" method="get" class="explore-find-form">
            <i class="fas fa-search"></i>

            <input type="text"
                   name="q"
                   placeholder="Find people by username..."
                   th:value="${searchQuery != null} ? ${searchQuery} : ''" />

            <button type="submit" class="primary-button">
                <i class="fas fa-arrow-right"></i> Search
            </button>
        </form>

        <!-- USERS -->
        <div class="users-grid">

            <th:block th:each="uw : ${users}">
                <div class="user-card">

                    <img th:with="avatarUrl=${(uw.user.profilePicture == null or #strings.isEmpty(uw.user.profilePicture))
                        ? '/assets/logo.png'
                        : (#strings.startsWith(uw.user.profilePicture, '/') ? uw.user.profilePicture : '/' + uw.user.profilePicture)}"
                         th:src="@{${avatarUrl}}"
                         th:alt="${uw.user.username}"
                         class="user-avatar" />

                    <div class="user-info">
                        <h4 th:text="${uw.user.username}">Username</h4>

                        <p th:if="${uw.user.bio}" class="user-bio"
                           th:text="${uw.user.bio}">Bio</p>

                        <div class="friend-actions">

                            <th:block th:switch="${uw.status.name()}">

                                <!-- NONE -->
                                <button th:case="NONE" type="button"
                                        class="friend-btn add-friend"
                                        th:attr="data-user-id=${uw.user.id}"
                                        onclick="handleFriendRequest(this, 'send')">
                                    <i class="fas fa-user-plus"></i> Add Friend
                                </button>

                                <!-- SENT -->
                                <button th:case="PENDING_SENT" type="button"
                                        class="friend-btn cancel-request"
                                        th:attr="data-user-id=${uw.user.id}"
                                        onclick="handleFriendRequest(this, 'cancel')">
                                    <i class="fas fa-user-clock"></i> Cancel
                                </button>

                                <!-- RECEIVED -->
                                <th:block th:case="PENDING_RECEIVED">
                                    <button type="button" class="friend-btn accept"
                                            th:attr="data-user-id=${uw.user.id}"
                                            onclick="handleFriendRequest(this, 'accept')">
                                        <i class="fas fa-check"></i> Accept
                                    </button>

                                    <button type="button" class="friend-btn reject"
                                            th:attr="data-user-id=${uw.user.id}"
                                            onclick="handleFriendRequest(this, 'reject')">
                                        <i class="fas fa-times"></i> Reject
                                    </button>
                                </th:block>

                                <!-- FRIENDS -->
                                <th:block th:case="FRIENDS">
                                    <a th:href="@{/profile(id=${uw.user.id})}" class="friend-btn view-profile">
                                        <i class="fas fa-user"></i> View Profile
                                    </a>
                                    <button type="button" class="friend-btn unfriend"
                                            th:attr="data-user-id=${uw.user.id}"
                                            onclick="handleFriendRequest(this, 'unfriend')">
                                        <i class="fas fa-user-minus"></i> Unfriend
                                    </button>
                                </th:block>

                            </th:block>

                        </div>
                    </div>
                </div>
            </th:block>

            <!-- EMPTY -->
            <p th:if="${#lists.isEmpty(users)}">No users found.</p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<!-- SCRIPT -->
<script>
function handleFriendRequest(btn, action) {
    const userId = btn.getAttribute('data-user-id');

    fetch('/api/friend_request?user_id=' + userId + '&action=' + action, {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        credentials: 'same-origin'
    })
    .then(r => r.json())
    .then(data => {
        if (data.success === 'true') {
            location.reload();
        } else {
            alert(data.message || 'Failed');
        }
    })
    .catch(() => alert('Error'));
}
</script>

</body>
</html>
