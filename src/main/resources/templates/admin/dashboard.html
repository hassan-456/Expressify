<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments :: head('Admin Dashboard')}"></head>

<body class="admin-body">

    <div th:replace="~{admin/fragments :: sidebar('dashboard')}"></div>

    <div class="admin-main">
        <header th:replace="~{admin/fragments :: header('Dashboard')}"></header>

        <div class="admin-content">
            <div class="stats-grid">
                <div class="stat-card" style="border-left: 4px solid var(--admin-accent)">
                    <h3><i class="fas fa-users"></i> Total Users</h3>
                    <p class="value" th:text="${totalUsers}">0</p>
                    <p class="trend up" th:text="'+' + ${newUsersToday} + ' today'">+0 today</p>
                </div>

                <div class="stat-card" style="border-left: 4px solid var(--admin-success)">
                    <h3><i class="fas fa-file-alt"></i> Total Posts</h3>
                    <p class="value" th:text="${totalPosts}">0</p>
                    <p class="trend">Overall activity</p>
                </div>

                <div class="stat-card" style="border-left: 4px solid var(--admin-danger)">
                    <h3><i class="fas fa-flag"></i> Reports</h3>
                    <p class="value" th:text="${totalReports}">0</p>
                    <p class="trend">Pending review</p>
                </div>
            </div>

            <div class="admin-table-container">
                <div class="admin-table-header">
                    <h3><i class="fas fa-user-plus"></i> Recently Registered Users</h3>
                    <a th:href="@{/admin/users}"
                        style="margin-left:auto; font-size: 0.8rem; color: var(--admin-accent); text-decoration: none;">View
                        All</a>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${recentUsers}">
                            <td>
                                <div class="user-cell">
                                    <img th:src="@{'/' + ${user.profilePicture != null ? user.profilePicture : 'assets/logo.png'}}"
                                        alt="Profile">
                                    <span th:text="${user.username}">Username</span>
                                </div>
                            </td>
                            <td th:text="${user.email}">user@example.com</td>
                            <td th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}">Date</td>
                            <td>
                                <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn-action view">
                                    <i class="fas fa-eye"></i> View
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="margin-bottom: 30px;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                    <h3 style="margin:0;"><i class="fas fa-images"></i> Recent Posts</h3>
                    <a th:href="@{/admin/posts}"
                        style="font-size: 0.8rem; color: var(--admin-accent); text-decoration: none;">View All</a>
                </div>

                <div class="card-grid">
                    <div class="item-card" th:each="post : ${recentPosts}">
                        <div class="item-card-header">
                            <img th:src="@{'/' + ${post.user.profilePicture != null ? post.user.profilePicture : 'assets/logo.png'}}"
                                alt="User">
                            <div class="info">
                                <h4 th:text="${post.user.username}">User</h4>
                                <p th:text="${#temporals.format(post.createdAt, 'MMM dd, yyyy')}">Date</p>
                            </div>
                        </div>
                        <div class="item-card-content">
                            <p th:text="${post.content}">Post content</p>
                            <img th:if="${post.media != null}" th:src="@{'/' + ${post.media.filePath}}"
                                alt="Post image">
                        </div>
                        <div class="item-card-footer">
                            <div class="item-actions">
                                <span style="font-size: 0.8rem; color: var(--admin-text-muted);">
                                    <i class="fas fa-heart" style="color:var(--admin-accent)"></i> <span
                                        th:text="${post.likes.size()}">0</span>
                                    <i class="fas fa-comment" style="color:var(--admin-accent); margin-left: 10px;"></i>
                                    <span th:text="${post.comments.size()}">0</span>
                                    <i class="fas fa-flag"
                                        th:style="${reportCounts.get(post.id) > 0 ? 'color:var(--admin-danger); margin-left:10px;' : 'color:var(--admin-accent); margin-left: 10px;'}"></i>
                                    <span th:text="${reportCounts.get(post.id)}">0</span> Reports
                                </span>
                            </div>
                            <div style="display:flex; gap:5px;">
                                <a th:href="@{/admin/posts/{id}(id=${post.id})}" class="btn-action view">
                                    <i class="fas fa-eye"></i> View
                                </a>
                                <form method="post" th:action="@{/admin/posts/delete}" style="margin: 0;"
                                    th:if="${reportCounts.get(post.id) > 5}">
                                    <input type="hidden" name="id" th:value="${post.id}">
                                    <button type="submit" class="btn-action delete"
                                        style="padding: 5px; font-size: 0.8rem;"
                                        onclick="return confirm('Multiple reports detected! Delete this post?');">
                                        <i class="fas fa-trash-alt"></i> Delete
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
