<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments :: head('Post Detail - Admin')}"></head>

<body class="admin-body">

    <div th:replace="~{admin/fragments :: sidebar('posts')}"></div>

    <div class="admin-main">
        <header th:replace="~{admin/fragments :: header('Post Detail')}"></header>

        <div class="admin-content">
            <div class="admin-table-container" style="max-width: 800px; margin: 0 auto; padding: 20px;">

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <a th:href="@{/admin/posts}" class="btn-action view" style="text-decoration: none;">
                        <i class="fas fa-arrow-left"></i> Back to Posts
                    </a>

                    <div style="display: flex; gap: 10px;">
                        <span th:if="${reportCount > 0}"
                            style="background: var(--admin-danger); color: white; padding: 5px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold;">
                            <i class="fas fa-flag"></i> <span th:text="${reportCount}">0</span> Reports
                        </span>

                        <form method="post" th:action="@{/admin/posts/feature}" style="margin: 0;">
                            <input type="hidden" name="id" th:value="${post.id}">
                            <button type="submit" class="btn-action feature" style="padding: 8px 15px;">
                                <i th:class="${post.featured ? 'fas fa-star' : 'far fa-star'}"></i>
                                <span th:text="${post.featured ? 'Unfeature' : 'Feature'}">Feature</span>
                            </button>
                        </form>

                        <form method="post" th:action="@{/admin/posts/delete}" style="margin: 0;"
                            th:if="${reportCount > 5}">
                            <input type="hidden" name="id" th:value="${post.id}">
                            <button type="submit" class="btn-action delete"
                                style="padding: 8px 15px; background: var(--admin-danger); color: white;"
                                onclick="return confirm('This post has many reports. Delete permanently?');">
                                <i class="fas fa-trash-alt"></i> Delete Post
                            </button>
                        </form>
                    </div>
                </div>

                <div class="item-card"
                    style="margin: 0; transform: none; box-shadow: none; border: 1px solid var(--admin-border);">
                    <div class="item-card-header" style="cursor: pointer;"
                        th:onclick="|window.location.href='@{/admin/users/{id}(id=${post.user.id})}'|">
                        <img th:src="@{'/' + ${post.user.profilePicture != null ? post.user.profilePicture : 'assets/logo.png'}}"
                            alt="User">
                        <div class="info">
                            <h4 th:text="${post.user.username}">User</h4>
                            <p th:text="${#temporals.format(post.createdAt, 'MMM dd, yyyy HH:mm')}">Date</p>
                        </div>
                    </div>

                    <div class="item-card-content" style="font-size: 1.1rem; line-height: 1.6;">
                        <p th:text="${post.content}">Post content</p>
                        <img th:if="${post.media != null}" th:src="@{'/' + ${post.media.filePath}}" alt="Post image"
                            style="max-height: 500px; object-fit: contain; width: 100%; border-radius: 8px; margin-top: 15px; background: #000;">
                    </div>

                    <div class="item-card-footer">
                        <div class="item-actions">
                            <span style="font-size: 1rem; color: var(--admin-text-muted);">
                                <i class="fas fa-heart" style="color:var(--admin-accent)"></i> <span
                                    th:text="${post.likes.size()}">0</span> Likes
                                <i class="fas fa-comment" style="color:var(--admin-accent); margin-left: 20px;"></i>
                                <span th:text="${post.comments.size()}">0</span> Comments
                            </span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
