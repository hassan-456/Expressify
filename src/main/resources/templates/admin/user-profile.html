<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments :: head('User Profile - Admin')}"></head>

<body class="admin-body">

    <div th:replace="~{admin/fragments :: sidebar('users')}"></div>

    <div class="admin-main">
        <header th:replace="~{admin/fragments :: header('User Profile: ' + ${user.username})}"></header>

        <div class="admin-content">
            <div class="admin-table-container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                    <img th:src="@{'/' + ${user.profilePicture != null ? user.profilePicture : 'assets/logo.png'}}"
                        alt="Profile"
                        style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--admin-accent);">
                    <div>
                        <h2 style="margin: 0; color: white;" th:text="${user.username}">Username</h2>
                        <p style="margin: 5px 0; color: var(--admin-text-muted);" th:text="${user.email}">
                            email@example.com</p>
                        <p style="margin: 0; font-size: 0.9rem;">
                            Joined: <strong th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}">Date</strong>
                            |
                            Status: <strong th:text="${user.status != null ? user.status : 'active'}"
                                th:class="${user.status != null && user.status.name() == 'banned' ? 'text-danger' : 'text-success'}"
                                style="text-transform: capitalize;">Active</strong>
                        </p>
                    </div>
                    <div style="margin-left: auto; display: flex; gap: 10px;">
                        <form th:if="${user.status == null || user.status.name() != 'banned'}" method="post"
                            th:action="@{/admin/users/ban}" style="margin: 0;">
                            <input type="hidden" name="id" th:value="${user.id}">
                            <button type="submit" class="btn-action bg-warning text-white"
                                style="border:none; padding:10px 15px; border-radius:5px; cursor:pointer;"
                                onclick="return confirm('Ban this user?');">
                                <i class="fas fa-ban"></i> Ban
                            </button>
                        </form>
                        <form method="post" th:action="@{/admin/users/delete}" style="margin: 0;">
                            <input type="hidden" name="id" th:value="${user.id}">
                            <button type="submit" class="btn-action bg-danger text-white"
                                style="border:none; padding:10px 15px; border-radius:5px; cursor:pointer; background: var(--admin-danger);"
                                onclick="return confirm('Delete this user permanently?');">
                                <i class="fas fa-trash-alt"></i> Delete
                            </button>
                        </form>
                    </div>
                </div>

                <h3 style="border-bottom: 1px solid var(--admin-border); padding-bottom: 10px; margin-top: 30px;">User's
                    Posts</h3>

                <div th:if="${#lists.isEmpty(posts)}"
                    style="text-align: center; padding: 20px; color: var(--admin-text-muted);">
                    No posts from this user yet.
                </div>

                <div class="card-grid" style="grid-template-columns: 1fr;">
                    <div class="item-card" th:each="post : ${posts}">
                        <div class="item-card-header">
                            <img th:src="@{'/' + ${post.user.profilePicture != null ? post.user.profilePicture : 'assets/logo.png'}}"
                                alt="User">
                            <div class="info">
                                <h4 th:text="${post.user.username}">User</h4>
                                <p th:text="${#temporals.format(post.createdAt, 'MMM dd, yyyy HH:mm')}">Date</p>
                            </div>
                        </div>
                        <div class="item-card-content">
                            <p th:text="${post.content}">Post content</p>
                            <img th:if="${post.media != null}" th:src="@{'/' + ${post.media.filePath}}" alt="Post image"
                                style="max-height: 400px; object-fit: contain; width: 100%; border-radius: 8px; margin-top: 10px;">
                        </div>
                        <div class="item-card-footer">
                            <div class="item-actions">
                                <span style="font-size: 0.8rem; color: var(--admin-text-muted);">
                                    <i class="fas fa-heart" style="color:var(--admin-accent)"></i> <span
                                        th:text="${post.likes.size()}">0</span>
                                    <i class="fas fa-comment" style="color:var(--admin-accent); margin-left: 10px;"></i>
                                    <span th:text="${post.comments.size()}">0</span>
                                </span>
                            </div>
                            <div style="display: flex; gap: 5px;">
                                <a th:href="@{/admin/posts/{id}(id=${post.id})}" class="btn-action view">
                                    <i class="fas fa-eye"></i> View Detail
                                </a>
                                <form method="post" th:action="@{/admin/posts/delete}" style="margin: 0;">
                                    <input type="hidden" name="id" th:value="${post.id}">
                                    <button type="submit" class="btn-action delete"
                                        style="padding: 5px 10px; font-size: 0.8rem;"
                                        onclick="return confirm('Delete this post?');">
                                        <i class="fas fa-trash-alt"></i> Delete
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
