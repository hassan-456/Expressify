<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments :: head('Login to Admin')}"></head>

<body class="admin-body galaxy-page">
    <div id="galaxy-background-container"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: #000;"></div>

    <div class="admin-login-container" style="width: 100%;">
        <div class="admin-login-box">
            <h2>Login to Expressify</h2>
            <p style="color: var(--admin-text-muted); margin-bottom: 30px; font-size: 0.9rem;">Welcome back! Please
                login to your admin account</p>

            <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>

            <form method="post" th:action="@{/admin/login}">
                <div class="form-group-admin">
                    <input type="email" name="email" required placeholder="✉ test@gmail.com" />
                </div>
                <div class="form-group-admin password-field-wrap">
                    <input type="password" id="admin_login_password" name="password" required
                        placeholder="🔒 ••••••" autocomplete="current-password" />
                    <button type="button" class="password-toggle-btn" aria-label="Show password" aria-pressed="false">
                        <i class="fas fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <p style="margin-top: 30px; font-size: 0.9rem; color: var(--admin-text-muted);">
                Don't have an admin account? Contact IT
            </p>
            <a th:href="@{/auth}" class="btn-switch-admin">
                <i class="fas fa-user"></i> Switch to User
            </a>
        </div>
    </div>

    <script type="module">
        import { initGalaxy } from '/js/galaxy.js';

        document.addEventListener("DOMContentLoaded", () => {
            initGalaxy('galaxy-background-container', { soft: true });
        });
    </script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
