# ===============================
# SERVER (Render requires dynamic port)
# ===============================
server.port=${PORT:8080}
server.servlet.context-path=/

# ===============================
# DATABASE (DO NOT HARDCODE)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/expressify_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Hassan@002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.expressify=DEBUG

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.livereload.enabled=false

# ===============================
# GEMINI API (use env variable)
# ===============================
maas.gemini.api-key=${MAAS_GEMINI_API_KEY=AIzaSyDOGmqjBSV7TAarEBopKReYbK8MtgEGbms}