<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments :: head('User Management')}"></head>

<body class="admin-body">

    <div th:replace="~{admin/fragments :: sidebar('users')}"></div>

    <div class="admin-main">
        <header th:replace="~{admin/fragments :: header('User Management')}"></header>

        <div class="admin-content">
            <p style="color: var(--admin-text-muted); margin-bottom: 20px;">Manage Expressify users and their settings
            </p>

            <div class="filters-bar">
                <input type="text" class="filter-input" id="userSearchInput"
                    placeholder="Search by username or email..." oninput="filterUsers()">

                <select class="filter-input" style="max-width: 150px;" id="statusFilter" onchange="filterUsers()">
                    <option value="all">Status: All</option>
                    <option value="active">Active</option>
                    <option value="banned">Banned</option>
                </select>
            </div>

            <div class="card-grid" id="userGrid">
                <div class="item-card user-card" th:each="user : ${users}" th:data-username="${user.username}"
                    th:data-email="${user.email}" th:data-status="${user.status.name()}">
                    <div style="text-align: center; margin-bottom: 15px;">
                        <img th:src="@{'/' + ${user.profilePicture != null ? user.profilePicture : 'assets/logo.png'}}"
                            style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 10px;"
                            alt="Profile">
                        <h3 style="margin: 0; font-size: 1.1rem;" th:text="${user.username}">Username</h3>
                        <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: var(--admin-text-muted);"
                            th:text="${user.email}">user@email.com</p>
                        <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: var(--admin-text-muted);">
                            <i class="far fa-calendar-alt"></i> Joined: <span
                                th:text="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}">Date</span>
                        </p>
                        <span th:if="${user.status.name() == 'active'}" class="status-badge active"
                            style="margin-top: 10px;">Active</span>
                        <span th:if="${user.status.name() == 'banned'}" class="status-badge banned"
                            style="margin-top: 10px;">Banned</span>
                    </div>

                    <div
                        style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; font-size: 0.8rem; color: var(--admin-text-muted);">
                        <span><i class="fas fa-file-alt" style="color:var(--admin-accent)"></i> <span
                                th:text="${user.posts.size()}">0</span> Posts</span>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto;">
                        <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn-action view"
                            style="justify-content: center;">
                            <i class="fas fa-eye"></i> View
                        </a>

                        <button type="button" class="btn-action ban"
                            th:style="${user.status.name() == 'banned'} ? 'justify-content:center; background:rgba(34,197,94,0.2); border-color:#22c55e; color:#22c55e;' : 'justify-content:center;'"
                            th:data-userid="${user.id}" th:data-action="ban"
                            th:data-label="${user.status.name() == 'banned'} ? 'unban' : 'ban'"
                            onclick="handleAction(this)">
                            <i th:class="${user.status.name() == 'banned'} ? 'fas fa-check-circle' : 'fas fa-ban'"></i>
                            <span th:text="${user.status.name() == 'banned'} ? 'Unban' : 'Ban'">Ban</span>
                        </button>

                        <button type="button" class="btn-action delete"
                            style="justify-content: center; width: 100%; grid-column: 1 / -1; border-color: var(--admin-danger); color: white; background-color: rgba(239, 68, 68, 0.2);"
                            th:data-userid="${user.id}" th:data-action="delete" onclick="handleAction(this)">
                            <i class="fas fa-trash-alt"></i> Delete User
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function handleAction(btn) {
            var userId = btn.getAttribute('data-userid');
            var action = btn.getAttribute('data-action');
            var label = btn.getAttribute('data-label') || action;

            var msg = action === 'delete'
                ? 'Are you sure you want to delete this user completely? This action cannot be undone.'
                : 'Are you sure you want to ' + label + ' this user?';

            if (!confirm(msg)) {
                return;
            }

            // Create and submit a hidden form
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = '/admin/users/' + action;
            var input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'id';
            input.value = userId;
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }

        function filterUsers() {
            var searchTerm = document.getElementById('userSearchInput').value.toLowerCase();
            var statusFilter = document.getElementById('statusFilter').value;
            var cards = document.querySelectorAll('.user-card');

            cards.forEach(function (card) {
                var username = (card.getAttribute('data-username') || '').toLowerCase();
                var email = (card.getAttribute('data-email') || '').toLowerCase();
                var status = card.getAttribute('data-status') || '';

                var matchesSearch = username.indexOf(searchTerm) !== -1 || email.indexOf(searchTerm) !== -1;
                var matchesStatus = statusFilter === 'all' || status === statusFilter;

                card.style.display = (matchesSearch && matchesStatus) ? '' : 'none';
            });
        }
    </script>

</body>

</html>
