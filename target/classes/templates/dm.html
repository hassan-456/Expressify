<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:with="currentTheme=${currentTheme != null} ? ${currentTheme} : 'light'">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} ?: 'Direct Messages - Expressify'">Direct Messages - Expressify</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        .dm-page-wrapper {
            margin-left: 280px;
            padding: 20px;
            height: 100vh;
            width: calc(100% - 280px);
        }

        .dm-page-container {
            display: flex;
            height: calc(100vh - 40px);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .dm-page-sidebar {
            width: 350px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
        }

        .dm-page-header {
            padding: 20px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-primary);
        }

        .dm-page-friends {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .dm-page-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        .dm-chat-header {
            padding: 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
        }

        .dm-messages {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: var(--bg-primary);
        }

        .dm-form {
            padding: 15px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        
        .container.dm-override {
            max-width: 100% !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        .dm-override .navbar { padding: 22px 16px !important; }

        .dm-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .dm-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .dm-send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: opacity 0.2s;
        }

        .dm-send-btn:hover {
            opacity: 0.9;
        }

        .dm-friend-item {
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .dm-friend-item:hover {
            background: var(--bg-primary);
        }

        .dm-friend-item.active {
            background: var(--primary-color);
            color: white;
        }

        .dm-friend-item.active .dm-friend-name {
            color: white;
        }

        .dm-friend-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .dm-friend-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        @media (max-width: 980px) {
            .dm-page-wrapper {
                margin-left: 0;
                width: 100%;
                padding: 12px;
                height: auto;
            }

            .dm-page-container {
                height: auto;
                min-height: 72vh;
                flex-direction: column;
            }

            .dm-page-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>

<body th:attr="data-theme=${currentTheme},class=${currentTheme + '-theme'}">
    <div class="container dm-override">
        <nav class="navbar relative">
            <div class="nav-brand">
                <h2><a th:href="@{/home}" style="color:inherit;text-decoration:none;">Expressify</a></h2>
            </div>
            <div class="nav-links">
                <a th:href="@{/home}" class="nav-item"><i class="fas fa-home"></i> Home</a>
                <a th:href="@{/posts}" class="nav-item"><i class="fas fa-pen"></i> Create Post</a>
                <a th:href="@{/explore}" class="nav-item"><i class="fas fa-compass"></i> Explore</a>
                <a th:href="@{/notifications}" class="nav-item" style="position:relative;">
                    <i class="fas fa-bell"></i> Notifications
                    <span th:if="${unreadCount != null && unreadCount > 0}" class="notification-badge"
                        th:text="${unreadCount}">0</span>
                </a>
                <a th:href="@{/profile}" class="nav-item"><i class="fas fa-user"></i> My Profile</a>
                <a th:href="@{/dm}" class="nav-item active"><i class="fas fa-comments"></i> DM</a>
                <a th:href="@{/friends}" class="nav-item"><i class="fas fa-users"></i> Friends</a>
                <a th:href="@{/settings}" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
                <!-- <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="nav-item"
                        style="background:none;border:none;cursor:pointer;font:inherit;color:inherit;"><i
                            class="fas fa-sign-out-alt"></i> Logout</button>
                </form> -->

<form th:action="@{/logout}" method="post" class="logout-form" style="margin:0; padding:0;">
    <button type="submit" class="nav-item nav-logout-btn" style="margin:0; padding:0;">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</form>

            </div>
            <div class="nav-toggle"><i class="fas fa-bars"></i></div>
        </nav>

        <div class="dm-page-wrapper">
            <div class="dm-page-container" id="dm-panel">
                <div class="dm-page-sidebar">
                    <div class="dm-page-header">
                        Chats
                    </div>
                    <div id="dm-friends-list" class="dm-page-friends">
                        <!-- friends loaded via JS -->
                    </div>
                </div>
                <div class="dm-page-chat">
                    <div id="dm-chat-header" class="dm-chat-header">Select a friend to start chatting</div>
                    <div id="dm-messages" class="dm-messages"></div>
                    <form id="dm-form" class="dm-form" onsubmit="sendDmMessage(); return false;">
                        <input type="text" id="dm-input" class="dm-input" placeholder="Type a message..."
                            autocomplete="off" />
                        <button type="submit" class="dm-send-btn" title="Send"><i
                                class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Override toggleDmPanel to keep it always visible on this page
            window.toggleDmPanel = function () { };
            if (typeof initDmTyping === 'function') {
                initDmTyping();
            }

            // Connect and load friends immediately
            if (typeof connectDmIfNeeded === 'function') {
                connectDmIfNeeded();
                loadDmFriends();
            } else {
                // If app.js hasn't exposed them, wait a bit
                setTimeout(function () {
                    if (typeof connectDmIfNeeded === 'function') {
                        connectDmIfNeeded();
                        loadDmFriends();
                    }
                }, 500);
            }
        });
    </script>
</body>

</html>
