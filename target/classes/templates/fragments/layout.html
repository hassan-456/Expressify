<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:with="currentTheme=${currentTheme != null} ? ${currentTheme} : 'light'">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} ?: 'Expressify'">Expressify</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body th:attr="data-theme=${currentTheme},class=${currentTheme + '-theme'}">
    <div class="container">
        <nav class="navbar relative">
            <div class="nav-brand">
                <h2><a th:href="@{/home}" style="color: inherit; text-decoration: none;">Expressify</a></h2>
            </div>
            <div class="nav-links">
                <a th:href="@{/home}" class="nav-item" th:classappend="${#request.requestURI == '/home'} ? 'active'"><i
                        class="fas fa-home"></i> Home</a>
                <a th:href="@{/posts}" class="nav-item"
                    th:classappend="${#request.requestURI == '/posts'} ? 'active'"><i class="fas fa-pen"></i> Create
                    Post</a>
                <a th:href="@{/explore}" class="nav-item"
                    th:classappend="${#request.requestURI == '/explore'} ? 'active'"><i class="fas fa-compass"></i>
                    Explore</a>
                <a th:href="@{/notifications}" class="nav-item"
                    th:classappend="${#request.requestURI == '/notifications'} ? 'active'" style="position: relative;">
                    <i class="fas fa-bell"></i> Notifications
                    <span th:if="${unreadCount != null && unreadCount > 0}" class="notification-badge"
                        th:text="${unreadCount}">0</span>
                </a>
                <a th:href="@{/profile}" class="nav-item"
                    th:classappend="${#request.requestURI == '/profile' && #request.getParameter('id') == null} ? 'active'"><i
                        class="fas fa-user"></i> My Profile</a>
                <a th:href="@{/friends}" class="nav-item"
                    th:classappend="${#request.requestURI == '/friends'} ? 'active'"><i class="fas fa-users"></i>
                    Friends</a>
                <a th:href="@{/settings}" class="nav-item"
                    th:classappend="${#request.requestURI == '/settings'} ? 'active'"><i class="fas fa-cog"></i>
                    Settings</a>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="nav-item"
                        style="background:none;border:none;cursor:pointer;font:inherit;color:inherit;"><i
                            class="fas fa-sign-out-alt"></i> Logout</button>
                </form>
            </div>
            <div class="nav-toggle"><i class="fas fa-bars"></i></div>
        </nav>
        <div class="content" th:replace="~{::content}">
            <!-- Page content -->
        </div>

        <!-- DM panel -->

    </div>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
